name: Go CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Tidy modules
        run: go mod tidy

      - name: Build Linux binary
        run: |
          GOOS=linux GOARCH=amd64 go build -o imagebed-server ./cmd/server

      - name: Test
        run: go test ./...

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: imagebed-server-linux-amd64
          path: imagebed-server
