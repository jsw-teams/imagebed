name: Release

on:
  push:
    tags:
      - "v*.*.*"   # 打 tag 才触发，例如 v0.1.0

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Tidy modules
        run: go mod tidy

      - name: Build linux amd64 binary
        run: |
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 \
          go build -o imagebed-server-linux-amd64 ./cmd/server

      - name: (optional) Compress binary
        run: |
          tar -czf imagebed-server-linux-amd64.tar.gz imagebed-server-linux-amd64

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        if: github.ref_type == 'tag'
        with:
          files: |
            imagebed-server-linux-amd64
            imagebed-server-linux-amd64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}