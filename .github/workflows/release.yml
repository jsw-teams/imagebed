name: Release Imagebed

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write    # 创建 Release + 上传附件 需要 write 权限

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Tidy modules
        run: go mod tidy

      - name: Run tests
        run: go test ./...

      - name: Build Linux amd64 binary
        run: |
          GOOS=linux GOARCH=amd64 go build -o imagebed-server-linux-amd64 ./cmd/server

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            imagebed-server-linux-amd64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
