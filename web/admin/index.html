<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>Imagebed 后台登录</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg-gradient: radial-gradient(circle at top, #e0f2fe 0, #eef2ff 35%, #f9fafb 100%);
      --card-bg: rgba(255, 255, 255, 0.96);
      --primary: #2563eb;
      --primary-soft: #dbeafe;
      --primary-deep: #1d4ed8;
      --danger: #dc2626;
      --text-main: #111827;
      --text-sub: #6b7280;
      --border-soft: rgba(148, 163, 184, 0.35);
      --shadow-soft: 0 22px 45px rgba(15, 23, 42, 0.13);
      --radius-xl: 24px;
      --radius-lg: 16px;
      --radius-md: 10px;
      --transition-fast: 150ms ease-out;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro SC",
                   "PingFang SC", "Segoe UI", sans-serif;
      background: var(--bg-gradient);
      color: var(--text-main);
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .shell {
      width: 100%;
      max-width: 480px;
      background: var(--card-bg);
      border-radius: var(--radius-xl);
      border: 1px solid var(--border-soft);
      box-shadow: var(--shadow-soft);
      padding: 24px 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .brand-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 6px;
    }

    .brand-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo {
      width: 32px;
      height: 32px;
      border-radius: 999px;
      background: conic-gradient(from 210deg, #1d4ed8, #22c55e, #0ea5e9, #1d4ed8);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: 700;
      font-size: 18px;
      box-shadow: 0 8px 16px rgba(37, 99, 235, 0.35);
    }

    .brand-text-main {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.03em;
    }

    .brand-text-sub {
      font-size: 13px;
      color: var(--text-sub);
    }

    .badge {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 999px;
      border: 1px solid #e5e7eb;
      background: #f9fafb;
      color: #6b7280;
    }

    .title-block {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-bottom: 4px;
    }

    .title-block h1 {
      margin: 0;
      font-size: 20px;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    .title-block p {
      margin: 0;
      font-size: 13px;
      color: var(--text-sub);
      line-height: 1.5;
    }

    .form {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-top: 4px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field-label-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 6px;
    }

    .field-label {
      font-size: 13px;
      font-weight: 500;
      color: #374151;
    }

    .field-hint {
      font-size: 11px;
      color: var(--text-sub);
    }

    .input {
      width: 100%;
      height: 40px;
      border-radius: var(--radius-md);
      border: 1px solid #e5e7eb;
      padding: 0 11px;
      font-size: 14px;
      color: var(--text-main);
      background: #f9fafb;
      transition: border-color var(--transition-fast), box-shadow var(--transition-fast),
                  background-color var(--transition-fast);
    }

    .input::placeholder {
      color: #9ca3af;
    }

    .input:focus {
      outline: none;
      border-color: #93c5fd;
      background: #ffffff;
      box-shadow: 0 0 0 1px #bfdbfe;
    }

    .input-error {
      border-color: rgba(220, 38, 38, 0.7);
      box-shadow: 0 0 0 1px rgba(220, 38, 38, 0.35);
    }

    .error-box {
      display: none;
      align-items: flex-start;
      gap: 8px;
      font-size: 12px;
      color: var(--danger);
      background: #fef2f2;
      border-radius: var(--radius-md);
      border: 1px solid #fecaca;
      padding: 7px 9px;
    }

    .error-box.visible {
      display: flex;
    }

    .error-dot {
      margin-top: 2px;
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: var(--danger);
      flex-shrink: 0;
    }

    .actions-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-top: 4px;
    }

    .btn-primary {
      flex: 1;
      height: 40px;
      border-radius: 999px;
      border: none;
      background: linear-gradient(135deg, var(--primary), var(--primary-deep));
      color: #ffffff;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      box-shadow: 0 14px 30px rgba(37, 99, 235, 0.45);
      transition: transform var(--transition-fast), box-shadow var(--transition-fast),
                  filter var(--transition-fast), opacity var(--transition-fast);
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      filter: brightness(1.03);
      box-shadow: 0 18px 36px rgba(37, 99, 235, 0.48);
    }

    .btn-primary:active {
      transform: translateY(0);
      box-shadow: 0 8px 18px rgba(37, 99, 235, 0.35);
    }

    .btn-primary[disabled] {
      cursor: default;
      opacity: 0.6;
      box-shadow: none;
      transform: none;
    }

    .btn-ghost {
      height: 36px;
      border-radius: 999px;
      border: 1px solid #e5e7eb;
      background: #f9fafb;
      color: #4b5563;
      font-size: 13px;
      padding: 0 14px;
      cursor: pointer;
      transition: background-color var(--transition-fast), border-color var(--transition-fast),
                  color var(--transition-fast), transform var(--transition-fast);
    }

    .btn-ghost:hover {
      background: #f3f4f6;
      transform: translateY(-0.5px);
    }

    .btn-ghost:active {
      transform: translateY(0);
    }

    .btn-primary-spinner {
      width: 14px;
      height: 14px;
      border-radius: 999px;
      border: 2px solid rgba(239, 246, 255, 0.7);
      border-top-color: #ffffff;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 8px;
      font-size: 11px;
      color: var(--text-sub);
    }

    .footer-right {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: #22c55e;
      box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.22);
    }

    .status-text {
      font-size: 11px;
    }

    .link {
      color: var(--primary);
      text-decoration: none;
      cursor: pointer;
    }

    .link:hover {
      text-decoration: underline;
    }

    @media (max-width: 480px) {
      .shell {
        padding: 18px 16px 14px;
        border-radius: 18px;
      }
      .title-block h1 {
        font-size: 18px;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div>
      <div class="brand-row">
        <div class="brand-left">
          <div class="logo">Ib</div>
          <div>
            <div class="brand-text-main">Imagebed 后台管理</div>
            <div class="brand-text-sub">仅管理员可访问，用于配置图床服务。</div>
          </div>
        </div>
        <span class="badge" id="badge-state">未登录</span>
      </div>

      <div class="title-block">
        <h1>管理员登录</h1>
        <p>
          使用安装时设置的管理员账号和密码登录。登录成功后将跳转到管理控制台，
          可以创建 / 调整存储桶、配置 Cloudflare Turnstile 等。
        </p>
      </div>
    </div>

    <div class="error-box" id="error-box">
      <div class="error-dot"></div>
      <div id="error-text"></div>
    </div>

    <form class="form" id="login-form">
      <div class="field">
        <div class="field-label-row">
          <label class="field-label" for="username">用户名</label>
          <span class="field-hint">例如：<code>admin</code></span>
        </div>
        <input
          id="username"
          class="input"
          type="text"
          name="username"
          autocomplete="username"
          placeholder="请输入管理员用户名"
        />
      </div>

      <div class="field">
        <div class="field-label-row">
          <label class="field-label" for="password">密码</label>
        </div>
        <input
          id="password"
          class="input"
          type="password"
          name="password"
          autocomplete="current-password"
          placeholder="请输入管理员密码"
        />
      </div>

      <div class="actions-row">
        <button type="submit" id="btn-login" class="btn-primary">
          <span>登录后台</span>
        </button>
        <button type="button" id="btn-clear" class="btn-ghost">清空</button>
      </div>
    </form>

    <div class="footer">
      <div>登录状态会保存在安全 Cookie 中，在不主动退出的情况下，可在同一浏览器长期保持登录。</div>
      <div class="footer-right">
        <div class="status-dot" id="status-dot" style="background:#f97316; box-shadow:0 0 0 4px rgba(249,115,22,0.25);"></div>
        <span class="status-text" id="status-text">正在检测会话…</span>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = "/api/admin";
    const DASHBOARD_URL = "/admin/dashboard"; // 之后仪表盘页面可以放这里

    const form = document.getElementById("login-form");
    const usernameInput = document.getElementById("username");
    const passwordInput = document.getElementById("password");
    const btnLogin = document.getElementById("btn-login");
    const btnClear = document.getElementById("btn-clear");
    const errorBox = document.getElementById("error-box");
    const errorText = document.getElementById("error-text");
    const badgeState = document.getElementById("badge-state");
    const statusDot = document.getElementById("status-dot");
    const statusText = document.getElementById("status-text");

    function setError(msg) {
      if (!msg) {
        errorBox.classList.remove("visible");
        errorText.textContent = "";
        usernameInput.classList.remove("input-error");
        passwordInput.classList.remove("input-error");
        return;
      }
      errorBox.classList.add("visible");
      errorText.textContent = msg;
      usernameInput.classList.add("input-error");
      passwordInput.classList.add("input-error");
    }

    function setLoading(isLoading) {
      if (isLoading) {
        btnLogin.disabled = true;
        btnLogin.innerHTML =
          '<div class="btn-primary-spinner"></div><span>正在登录…</span>';
      } else {
        btnLogin.disabled = false;
        btnLogin.innerHTML = "<span>登录后台</span>";
      }
    }

    function updateSessionUI(loggedIn, username) {
      if (loggedIn) {
        badgeState.textContent = "已登录";
        badgeState.style.background = "#ecfdf5";
        badgeState.style.color = "#166534";
        badgeState.style.borderColor = "#bbf7d0";

        statusDot.style.background = "#22c55e";
        statusDot.style.boxShadow = "0 0 0 4px rgba(34,197,94,0.22)";
        statusText.textContent = username
          ? "已登录：" + username
          : "已登录";
      } else {
        badgeState.textContent = "未登录";
        badgeState.style.background = "#f9fafb";
        badgeState.style.color = "#4b5563";
        badgeState.style.borderColor = "#e5e7eb";

        statusDot.style.background = "#f97316";
        statusDot.style.boxShadow = "0 0 0 4px rgba(249,115,22,0.25)";
        statusText.textContent = "尚未登录";
      }
    }

    async function checkSession() {
      try {
        const resp = await fetch(API_BASE + "/session", {
          credentials: "include"
        });
        if (!resp.ok) {
          updateSessionUI(false);
          return;
        }
        const data = await resp.json().catch(() => ({}));
        const logged = !!data.logged_in;
        const username = data.username || "";
        updateSessionUI(logged, username);

        // 如果已经登录，直接跳转到仪表盘
        if (logged && DASHBOARD_URL) {
          window.location.href = DASHBOARD_URL;
        }
      } catch (e) {
        statusDot.style.background = "#f97316";
        statusText.textContent = "会话检测失败";
      }
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      setError("");

      const username = usernameInput.value.trim();
      const password = passwordInput.value.trim();

      if (!username || !password) {
        setError("请完整填写用户名和密码。");
        return;
      }

      setLoading(true);
      try {
        const resp = await fetch(API_BASE + "/login", {
          method: "POST",
          credentials: "include",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            username,
            password
          })
        });

        const data = await resp.json().catch(() => ({}));

        if (!resp.ok || !data.ok) {
          const msg =
            data.error === "invalid_credentials"
              ? "用户名或密码不正确。"
              : data.detail ||
                data.error ||
                "登录失败，请稍后重试。";
          setError(msg);
          updateSessionUI(false);
          return;
        }

        updateSessionUI(true, username);
        setError("");

        // 登录成功，跳转到仪表盘
        if (DASHBOARD_URL) {
          window.location.href = DASHBOARD_URL;
        }
      } catch (err) {
        console.error(err);
        setError("无法连接服务器，请检查网络或稍后再试。");
      } finally {
        setLoading(false);
      }
    });

    btnClear.addEventListener("click", () => {
      usernameInput.value = "";
      passwordInput.value = "";
      setError("");
      usernameInput.focus();
    });

    // Enter 快捷键：光标在密码框时回车直接提交
    passwordInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        form.dispatchEvent(new Event("submit", { cancelable: true }));
      }
    });

    // 页面加载后检测是否已经登录
    checkSession();
  </script>
</body>
</html>
