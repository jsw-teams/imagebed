<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>Imagebed 管理后台登录</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex,nofollow" />
  <meta name="description" content="登录 Imagebed 管理后台。" />
  <link rel="stylesheet" href="/admin/index.css" />
</head>
<body>
  <div class="ad-shell">
    <div class="ad-card">
      <header class="ad-header">
        <div class="ad-brand">
          <div class="ad-logo">Ib</div>
          <div>
            <div class="ad-title">Imagebed 管理后台</div>
            <div class="ad-sub">登录以管理桶与上传策略。</div>
          </div>
        </div>
      </header>
      <main class="ad-main">
        <div class="ad-field">
          <label for="username">用户名</label>
          <input id="username" class="ad-input" autocomplete="username" />
        </div>
        <div class="ad-field">
          <label for="password">密码</label>
          <input id="password" class="ad-input" type="password" autocomplete="current-password" />
        </div>
        <button id="btn-login" class="ad-btn ad-btn-primary">登录</button>
        <div id="status" class="ad-status"></div>
      </main>
    </div>
  </div>

  <div id="ts-overlay" class="ad-ts-overlay" style="display:none;">
    <div class="ad-ts-modal">
      <button id="ts-close" class="ad-ts-close" aria-label="关闭验证">×</button>
      <div class="ad-ts-title">请完成人机验证</div>
      <div id="ts-widget" class="ad-ts-widget"></div>
      <div id="ts-hint" class="ad-ts-hint"></div>
    </div>
  </div>

  <script src="/admin/index.js" defer></script>
</body>
</html>
