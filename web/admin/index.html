<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>Imagebed 管理后台登录</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="登录 Imagebed 管理后台，管理图床存储桶与安全配置。" />
  <meta name="keywords" content="Imagebed, 图床, 管理后台, 登录" />
  <meta name="robots" content="noindex,nofollow" />
  <meta property="og:title" content="Imagebed 管理后台登录" />
  <meta property="og:description" content="登录 Imagebed 管理后台，管理图床服务配置。" />
  <meta property="og:type" content="website" />
  <meta property="og:locale" content="zh_CN" />
  <link rel="stylesheet" href="index.css" />
</head>
<body>
  <div class="shell">
    <div>
      <div class="brand-row">
        <div class="brand-left">
          <div class="logo">Ib</div>
          <div>
            <div class="brand-text-main">Imagebed 管理后台</div>
            <div class="brand-text-sub">仅管理员可访问。</div>
          </div>
        </div>
        <span class="badge" id="badge-state">未登录</span>
      </div>

      <div class="title-block">
        <h1>管理员登录</h1>
        <p>使用安装时设置的账号密码登录后台。</p>
      </div>
    </div>

    <div class="error-box" id="error-box">
      <div class="error-dot"></div>
      <div id="error-text"></div>
    </div>

    <form class="form" id="login-form">
      <div class="field">
        <div class="field-label-row">
          <label class="field-label" for="username">用户名</label>
          <span class="field-hint">例如：<code>admin</code></span>
        </div>
        <input
          id="username"
          class="input"
          type="text"
          name="username"
          autocomplete="username"
          placeholder="请输入管理员用户名"
        />
      </div>

      <div class="field">
        <div class="field-label-row">
          <label class="field-label" for="password">密码</label>
        </div>
        <input
          id="password"
          class="input"
          type="password"
          name="password"
          autocomplete="current-password"
          placeholder="请输入管理员密码"
        />
      </div>

      <div class="actions-row">
        <button type="submit" id="btn-login" class="btn-primary">
          <span>登录后台</span>
        </button>
        <button type="button" id="btn-clear" class="btn-ghost">清空</button>
      </div>
    </form>

    <div class="footer">
      <div>登录状态保存在安全 Cookie 中，在同一浏览器可长期保持登录。</div>
      <div class="footer-right">
        <div class="status-dot" id="status-dot" style="background:#f97316; box-shadow:0 0 0 4px rgba(249,115,22,0.25);"></div>
        <span class="status-text" id="status-text">正在检测会话…</span>
      </div>
    </div>
  </div>

  <script src="index.js"></script>
</body>
</html>
