<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>Imagebed 后台管理</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      margin: 0;
      padding: 40px 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: #f4f4f5;
      color: #111827;
    }
    .container {
      max-width: 960px;
      margin: 0 auto;
      background: #ffffff;
      border-radius: 12px;
      padding: 24px 22px 24px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 22px;
    }
    .subtitle {
      margin: 0 0 16px;
      font-size: 13px;
      color: #6b7280;
    }
    .top-links {
      font-size: 12px;
      margin-bottom: 12px;
    }
    .top-links a {
      color: #2563eb;
      text-decoration: none;
      margin-right: 12px;
    }
    .section {
      margin-top: 20px;
      padding-top: 12px;
      border-top: 1px solid #e5e7eb;
    }
    .section-title {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .section-desc {
      font-size: 12px;
      color: #6b7280;
      margin-bottom: 10px;
    }
    label {
      display: inline-block;
      margin-top: 8px;
      font-size: 13px;
      font-weight: 600;
    }
    input, textarea {
      font-family: inherit;
      font-size: 14px;
      border-radius: 6px;
      border: 1px solid #e5e7eb;
      padding: 7px 9px;
      box-sizing: border-box;
    }
    input:focus, textarea:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 1px rgba(37, 99, 235, 0.15);
    }
    .field-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      margin-top: 6px;
    }
    .field-row label {
      margin-top: 0;
    }
    button {
      padding: 7px 14px;
      border-radius: 999px;
      border: none;
      background: #2563eb;
      color: #fff;
      font-size: 13px;
      cursor: pointer;
    }
    button.small {
      padding: 4px 10px;
      font-size: 12px;
    }
    button.danger {
      background: #dc2626;
    }
    button[disabled] {
      opacity: .6;
      cursor: default;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 8px;
      font-size: 12px;
    }
    th, td {
      border-bottom: 1px solid #e5e7eb;
      padding: 6px 4px;
      text-align: left;
    }
    th { background: #f9fafb; }
    .msg {
      margin-top: 8px;
      font-size: 13px;
      display: none;
    }
    .msg.error { color: #b91c1c; }
    .msg.success { color: #15803d; }
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 11px;
    }
    .badge.ok { background: #dcfce7; color: #166534; }
    .badge.warn { background: #fee2e2; color: #b91c1c; }
  </style>
</head>
<body>
  <div class="container">
    <div class="top-links">
      <a href="/upload/">返回上传页</a>
    </div>

    <h1>Imagebed 后台管理</h1>
    <p class="subtitle">
      这里是一个简单的后台管理界面，用于试验 API、创建 / 修改 / 删除桶配置。
      敏感操作需要管理员账号密码。
    </p>

    <!-- 登录区域 -->
    <div class="section">
      <div class="section-title">0. 管理员登录</div>
      <div class="section-desc">
        使用初始化时创建的管理员账号进行登录。登录通过后，后续桶增删改操作会自动携带 Basic Auth。
      </div>

      <div class="field-row">
        <label for="admin-user">用户名</label>
        <input id="admin-user" style="min-width:120px" />
        <label for="admin-pass">密码</label>
        <input id="admin-pass" type="password" style="min-width:120px" />
        <button id="btn-login">登录</button>
        <span id="login-status" class="badge warn">未登录</span>
      </div>
      <div class="field-row">
        <label for="ts-token">Turnstile Token（可留空）</label>
        <input id="ts-token" style="min-width:260px" placeholder="如果后台启用了 Turnstile，在此填写调试 token" />
      </div>
      <div id="login-msg" class="msg"></div>
    </div>

    <!-- 桶列表 -->
    <div class="section">
      <div class="section-title">1. 当前桶列表</div>
      <div class="section-desc">
        这里展示所有已配置的桶。刷新列表不需要登录，但删除操作需要管理员登录。
      </div>

      <button class="small" id="btn-refresh">刷新列表</button>
      <span id="list-hint" style="font-size:12px;color:#6b7280;margin-left:6px;"></span>

      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>名称</th>
            <th>R2 桶名</th>
            <th>配额 (max_bytes)</th>
            <th>已用 (current_bytes)</th>
            <th>状态</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="bucket-tbody">
          <tr><td colspan="7" style="text-align:center;color:#9ca3af;">暂无数据</td></tr>
        </tbody>
      </table>

      <div id="bucket-msg" class="msg"></div>
    </div>

    <!-- 创建桶 -->
    <div class="section">
      <div class="section-title">2. 创建新桶</div>
      <div class="section-desc">
        创建时需要管理员登录。最大容量单位为字节，例如 1073741824 约等于 1 GiB。
      </div>

      <div class="field-row">
        <label for="b-name">桶显示名称</label>
        <input id="b-name" style="min-width:160px" placeholder="例如：默认图床" />
      </div>
      <div class="field-row">
        <label for="b-r2">R2 桶名称</label>
        <input id="b-r2" style="min-width:160px" placeholder="例如：imgbed" />
      </div>
      <div class="field-row">
        <label for="b-max">最大容量（字节）</label>
        <input id="b-max" style="min-width:160px" placeholder="例如：1073741824" />
      </div>
      <div class="field-row">
        <button id="btn-create">创建桶</button>
      </div>
      <div id="create-msg" class="msg"></div>
    </div>
  </div>

  <script>
    let adminUser = "";
    let adminPass = "";
    let loggedIn = false;

    const loginMsg = document.getElementById("login-msg");
    const loginStatus = document.getElementById("login-status");
    const bucketMsg = document.getElementById("bucket-msg");
    const createMsg = document.getElementById("create-msg");
    const listHint = document.getElementById("list-hint");

    function showMsg(el, type, text) {
      el.textContent = text;
      el.className = "msg " + type;
      el.style.display = "block";
    }

    function clearMsg(el) {
      el.style.display = "none";
    }

    function authHeaders() {
      if (!loggedIn || !adminUser || !adminPass) return {};
      const token = btoa(adminUser + ":" + adminPass);
      return { "Authorization": "Basic " + token };
    }

    function tsHeader() {
      const token = document.getElementById("ts-token").value.trim();
      if (!token) return {};
      return { "X-Turnstile-Token": token };
    }

    async function login() {
      clearMsg(loginMsg);
      const user = document.getElementById("admin-user").value.trim();
      const pass = document.getElementById("admin-pass").value.trim();
      if (!user || !pass) {
        showMsg(loginMsg, "error", "请填写管理员用户名和密码。");
        return;
      }

      try {
        const res = await fetch("/api/admin/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username: user, password: pass }),
        });
        const json = await res.json().catch(() => ({}));

        if (!res.ok || !json.ok) {
          showMsg(loginMsg, "error", json.error || "登录失败，请检查账号密码。");
          loggedIn = false;
          loginStatus.textContent = "未登录";
          loginStatus.className = "badge warn";
        } else {
          loggedIn = true;
          adminUser = user;
          adminPass = pass;
          showMsg(loginMsg, "success", "登录成功，后续桶操作将使用该账号。");
          loginStatus.textContent = "已登录";
          loginStatus.className = "badge ok";
          // 登录成功后自动刷新一次列表
          loadBuckets();
        }
      } catch (err) {
        showMsg(loginMsg, "error", "登录请求失败：" + err);
        loggedIn = false;
        loginStatus.textContent = "未登录";
        loginStatus.className = "badge warn";
      }
    }

    async function loadBuckets() {
      clearMsg(bucketMsg);
      listHint.textContent = "加载中...";
      const tbody = document.getElementById("bucket-tbody");
      tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:#9ca3af;">加载中...</td></tr>';

      try {
        const res = await fetch("/api/buckets");
        const json = await res.json().catch(() => ({}));

        if (!res.ok || !Array.isArray(json)) {
          tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:#9ca3af;">加载失败</td></tr>';
          showMsg(bucketMsg, "error", json.error || "加载存储桶列表失败。");
          listHint.textContent = "";
          return;
        }

        if (json.length === 0) {
          tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:#9ca3af;">当前没有任何桶，请在下方创建。</td></tr>';
          listHint.textContent = "暂无桶。";
          return;
        }

        tbody.innerHTML = "";
        json.forEach(b => {
          const tr = document.createElement("tr");

          const tdId = document.createElement("td");
          tdId.textContent = b.id;
          tr.appendChild(tdId);

          const tdName = document.createElement("td");
          tdName.textContent = b.name;
          tr.appendChild(tdName);

          const tdR2 = document.createElement("td");
          tdR2.textContent = b.r2_bucket || "";
          tr.appendChild(tdR2);

          const tdMax = document.createElement("td");
          tdMax.textContent = b.max_bytes != null ? String(b.max_bytes) : "";
          tr.appendChild(tdMax);

          const tdCur = document.createElement("td");
          tdCur.textContent = b.current_bytes != null ? String(b.current_bytes) : "";
          tr.appendChild(tdCur);

          const tdStatus = document.createElement("td");
          tdStatus.textContent = b.disabled ? "已禁用" : "正常";
          tr.appendChild(tdStatus);

          const tdOps = document.createElement("td");
          const delBtn = document.createElement("button");
          delBtn.textContent = "删除";
          delBtn.className = "small danger";
          if (!loggedIn) {
            delBtn.disabled = true;
            delBtn.title = "请先登录管理员账号";
          } else {
            delBtn.addEventListener("click", () => {
              if (confirm("确定要删除该桶吗？此操作不可恢复。")) {
                deleteBucket(b.id);
              }
            });
          }
          tdOps.appendChild(delBtn);
          tr.appendChild(tdOps);

          tbody.appendChild(tr);
        });

        listHint.textContent = "共 " + json.length + " 个桶。";
      } catch (err) {
        tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:#9ca3af;">加载失败</td></tr>';
        showMsg(bucketMsg, "error", "加载存储桶列表失败：" + err);
        listHint.textContent = "";
      }
    }

    async function createBucket() {
      clearMsg(createMsg);
      if (!loggedIn) {
        showMsg(createMsg, "error", "请先在上方登录管理员账号。");
        return;
      }

      const name = document.getElementById("b-name").value.trim();
      const r2 = document.getElementById("b-r2").value.trim();
      const maxStr = document.getElementById("b-max").value.trim();

      if (!name || !r2 || !maxStr) {
        showMsg(createMsg, "error", "显示名称、R2 桶名和最大容量均不能为空。");
        return;
      }

      const maxBytes = Number(maxStr);
      if (!Number.isFinite(maxBytes) || maxBytes <= 0) {
        showMsg(createMsg, "error", "最大容量必须是大于 0 的数字。");
        return;
      }

      const btn = document.getElementById("btn-create");
      btn.disabled = true;

      try {
        const headers = Object.assign(
          { "Content-Type": "application/json" },
          authHeaders(),
          tsHeader()
        );

        const res = await fetch("/api/buckets", {
          method: "POST",
          headers,
          body: JSON.stringify({
            name: name,
            r2_bucket: r2,
            max_bytes: maxBytes,
          }),
        });
        const json = await res.json().catch(() => ({}));

        if (!res.ok) {
          showMsg(createMsg, "error", json.error || "创建桶失败。");
        } else {
          showMsg(createMsg, "success", "创建成功！");
          document.getElementById("b-name").value = "";
          document.getElementById("b-r2").value = "";
          document.getElementById("b-max").value = "";
          loadBuckets();
        }
      } catch (err) {
        showMsg(createMsg, "error", "创建桶请求失败：" + err);
      } finally {
        btn.disabled = false;
      }
    }

    async function deleteBucket(id) {
      clearMsg(bucketMsg);
      try {
        const headers = Object.assign({}, authHeaders(), tsHeader());
        const res = await fetch("/api/buckets/" + encodeURIComponent(id), {
          method: "DELETE",
          headers,
        });
        const json = await res.json().catch(() => ({}));

        if (!res.ok) {
          showMsg(bucketMsg, "error", json.error || "删除桶失败。");
        } else {
          showMsg(bucketMsg, "success", "删除成功。");
          loadBuckets();
        }
      } catch (err) {
        showMsg(bucketMsg, "error", "删除桶请求失败：" + err);
      }
    }

    document.getElementById("btn-login").addEventListener("click", login);
    document.getElementById("btn-refresh").addEventListener("click", loadBuckets);
    document.getElementById("btn-create").addEventListener("click", (e) => {
      e.preventDefault();
      createBucket();
    });

    // 页面加载完，先尝试加载一次列表（即使未登录也可以看）
    loadBuckets();
  </script>
</body>
</html>
