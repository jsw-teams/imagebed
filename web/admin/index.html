<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>Imagebed 后台登录</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Imagebed 图床后台登录页面，仅管理员访问。" />
  <link rel="stylesheet" href="/admin/index.css" />
</head>
<body>
  <div class="shell">
    <div>
      <div class="brand-row">
        <div class="brand-left">
          <div class="logo">Ib</div>
          <div>
            <div class="brand-text-main">Imagebed 管理后台</div>
            <div class="brand-text-sub">仅管理员可访问。</div>
          </div>
        </div>
        <span class="badge" id="badge-state">未登录</span>
      </div>

      <div class="title-block">
        <h1>管理员登录</h1>
        <p>使用安装时设置的账号密码登录后台。</p>
      </div>
    </div>

    <div class="error-box" id="error-box">
      <div class="error-dot"></div>
      <div id="error-text"></div>
    </div>

    <form class="form" id="login-form">
      <div class="field">
        <div class="field-label-row">
          <label class="field-label" for="username">用户名</label>
          <span class="field-hint">例如：<code>admin</code></span>
        </div>
        <input
          id="username"
          class="input"
          type="text"
          name="username"
          autocomplete="username"
          placeholder="请输入管理员用户名"
        />
      </div>

      <div class="field">
        <div class="field-label-row">
          <label class="field-label" for="password">密码</label>
        </div>
        <input
          id="password"
          class="input"
          type="password"
          name="password"
          autocomplete="current-password"
          placeholder="请输入管理员密码"
        />
      </div>

      <div class="actions-row">
        <button type="submit" id="btn-login" class="btn-primary">
          <span>登录后台</span>
        </button>
        <button type="button" id="btn-clear" class="btn-ghost">清空</button>
      </div>
    </form>
    </div>
  </div>

  <script src="/admin/index.js"></script>
</body>
</html>
