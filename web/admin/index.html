<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Imagebed 管理登录</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="index.css">
</head>
<body class="admin-login-body">
  <div class="page">
    <header class="brand">
      <div class="brand-logo">Ib</div>
      <div>
        <div class="brand-title">Imagebed 管理登录</div>
        <div class="brand-subtitle">请使用管理员账号密码进入控制台。</div>
      </div>
    </header>
    <section class="card">
      <div class="card-header">
        <h1>登录控制台</h1>
        <p>登录成功后将跳转到 <code>/admin/dashboard</code>，未登录时前台上传页仍可正常访问。</p>
      </div>
      <form id="login-form" novalidate>
        <div class="field">
          <label class="field-label" for="username">用户名</label>
          <input id="username" name="username" autocomplete="username" placeholder="admin">
        </div>
        <div class="field">
          <label class="field-label" for="password">密码</label>
          <input id="password" name="password" type="password" autocomplete="current-password" placeholder="••••••••">
        </div>
        <div class="field ts-wrapper" id="turnstile-wrapper" hidden></div>
        <div class="actions">
          <button type="submit" class="btn-primary" id="login-submit">登录</button>
          <span id="login-message" class="message"></span>
        </div>
      </form>
      <div class="footer">登录成功后将跳转到后台。如忘记密码，请在服务器上重置管理员账号。</div>
    </section>
  </div>
  <script src="index.js"></script>
</body>
</html>
