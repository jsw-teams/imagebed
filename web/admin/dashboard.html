<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>Imagebed 管理面板</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Imagebed 图床管理面板，管理存储桶与 Turnstile 设置。" />
  <link rel="stylesheet" href="/admin/dashboard.css" />
</head>
<body>
  <div class="shell">
    <header class="header">
      <div class="brand">
        <div class="brand-logo">Ib</div>
        <div class="brand-text">
          <div class="brand-title">Imagebed 管理</div>
          <div class="brand-sub">存储桶与人机验证配置</div>
        </div>
      </div>
      <div class="header-actions">
        <a class="btn-link" href="/">返回首页</a>
        <button id="btn-logout" class="btn-ghost">退出登录</button>
      </div>
    </header>

    <nav class="tabs">
      <button id="tab-buckets" class="tab active">存储桶</button>
      <button id="tab-turnstile" class="tab">Turnstile</button>
    </nav>

    <div id="dashboard-status" class="status"></div>

    <main class="content">
      <!-- 存储桶管理 -->
      <section id="panel-buckets" class="panel panel-active">
        <div class="split">
          <div class="card">
            <h2 class="card-title">存储桶详情</h2>
            <form id="bucket-form" class="form">
              <input type="hidden" id="bucket-id" />
              <div class="field">
                <label for="bucket-name">名称</label>
                <input id="bucket-name" class="input" placeholder="内部标识名称" />
              </div>
              <div class="field">
                <label for="bucket-display">显示名</label>
                <input id="bucket-display" class="input" placeholder="列表中显示的名称" />
              </div>
              <div class="field">
                <label for="bucket-account">Account ID</label>
                <input id="bucket-account" class="input" placeholder="R2 Account ID" />
              </div>
              <div class="field">
                <label for="bucket-name-r2">Bucket 名称</label>
                <input id="bucket-name-r2" class="input" placeholder="R2 桶名称" />
              </div>
              <div class="field">
                <label for="bucket-public-url">公开访问前缀</label>
                <input id="bucket-public-url" class="input" placeholder="例如：https://img.example.com" />
              </div>
              <div class="field">
                <label for="bucket-max">最大容量 (MB)</label>
                <input id="bucket-max" class="input" type="number" min="0" placeholder="0 表示不限" />
              </div>
              <div class="field field-inline">
                <label><input type="checkbox" id="bucket-active" /> 启用</label>
                <label><input type="checkbox" id="bucket-default" /> 设为默认上传目标</label>
              </div>
              <div class="button-row">
                <button type="button" id="btn-bucket-new" class="btn-ghost">新建</button>
                <button type="submit" id="btn-bucket-save" class="btn-primary">保存</button>
                <button type="button" id="btn-bucket-delete" class="btn-danger">删除</button>
              </div>
            </form>
          </div>
          <div class="card">
            <h2 class="card-title">存储桶列表</h2>
            <div class="table-wrapper">
              <table class="table">
                <thead>
                  <tr>
                    <th>名称</th>
                    <th>Bucket</th>
                    <th>默认</th>
                    <th>启用</th>
                    <th>容量(MB)</th>
                  </tr>
                </thead>
                <tbody id="buckets-tbody"></tbody>
              </table>
            </div>
          </div>
        </div>
      </section>

      <!-- Turnstile 设置 -->
      <section id="panel-turnstile" class="panel">
        <div class="card card-narrow">
          <h2 class="card-title">Turnstile 设置</h2>
          <form id="ts-form" class="form">
            <div class="field">
              <label><input type="checkbox" id="ts-enabled" /> 启用 Turnstile 校验</label>
            </div>
            <div class="field">
              <label for="ts-site">Site Key</label>
              <input id="ts-site" class="input" placeholder="0x 开头的 Site Key" />
            </div>
            <div class="field">
              <label for="ts-secret">Secret Key</label>
              <input id="ts-secret" class="input" type="password" placeholder="仅在需要更新时填写" />
            </div>
            <div class="button-row">
              <button type="submit" id="ts-save" class="btn-primary">保存设置</button>
            </div>
          </form>

          <h3 class="card-subtitle">密钥测试</h3>
          <form id="ts-test-form" class="form">
            <div class="field">
              <label for="ts-test-token">测试 Token</label>
              <input id="ts-test-token" class="input" placeholder="从 Turnstile 测试页获取 token" />
            </div>
            <div class="button-row">
              <button type="button" id="ts-btn-test" class="btn-ghost">发送测试请求</button>
            </div>
          </form>
        </div>
      </section>
    </main>
  </div>
  <script src="/admin/dashboard.js"></script>
</body>
</html>
