<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>Imagebed 图床上传</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="轻量级图床服务，支持 Cloudflare R2，多桶与 Turnstile 防滥用。">
  <link rel="stylesheet" href="/index.css" />
</head>
<body>
  <div class="upload-shell">
    <header class="upload-header">
      <div class="brand">
        <div class="brand-logo">Ib</div>
        <div class="brand-text">
          <div class="brand-title">Imagebed 图床</div>
          <div class="brand-sub">图片托管 · R2 存储 · 轻量安全</div>
        </div>
      </div>
      <div class="header-actions">
        <a class="header-link" href="/admin">管理后台</a>
      </div>
    </header>

    <main class="upload-main">
      <section class="upload-card">
        <div class="upload-head">
          <h1 class="upload-title">上传图片</h1>
          <p class="upload-sub">支持常见图片格式，服务器将自动分配存储桶并返回链接。</p>
        </div>

        <div class="upload-msg" id="upload-msg"></div>

        <form id="upload-form" class="upload-form" enctype="multipart/form-data">
          <div id="drop-zone" class="drop-zone">
            <div class="drop-inner">
              <div class="drop-icon">⬆</div>
              <div class="drop-title">拖拽图片到此处，或点击选择文件</div>
              <div class="drop-sub">仅用于图片托管，请勿上传违规内容。</div>
              <label class="file-trigger" for="upload-file">选择图片文件</label>
              <input id="upload-file" name="file" type="file" accept="image/*" class="file-input" />
              <div class="file-info" id="file-info">尚未选择文件</div>
            </div>
          </div>

          <div id="turnstile-container" class="turnstile-wrap hidden">
            <div class="turnstile-label">人机验证</div>
            <!-- JS 会在此插入 Turnstile 小组件 -->
          </div>

          <div class="upload-actions">
            <button id="upload-submit" type="submit" class="btn-primary">上传</button>
          </div>
        </form>

        <section id="upload-result" class="result-card">
          <div class="result-title">上传结果</div>
          <div class="result-row">
            <input id="result-url" class="result-input" readonly />
            <button id="copy-url" type="button" class="btn-secondary">复制链接</button>
          </div>
          <div class="result-extra">
            <div>Markdown：<code id="result-md"></code></div>
            <div>HTML：<code id="result-html"></code></div>
          </div>
        </section>

        <p class="upload-footnote">
          默认限制约 10 MiB，可在配置文件中调整。具体以服务器配置为准。
        </p>
      </section>
    </main>
  </div>

  <script src="/index.js"></script>
</body>
</html>
