<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>Imagebed 图床 · 上传</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Imagebed 轻量图床，支持常见图片格式一键上传，生成可公开访问的图片链接。" />
  <link rel="canonical" href="/" />
  <link rel="stylesheet" href="/index.css" />
  <script src="/index.js" defer></script>
</head>
<body>
  <div class="shell">
    <div class="header-row">
      <div class="brand">
        <div class="brand-logo">Ib</div>
        <div>
          <div class="brand-text-main">Imagebed 图床 · 上传</div>
          <div class="brand-text-sub">选择图片，上传后获取外链地址。</div>
        </div>
      </div>
      <div class="header-right">
        <a href="/admin" class="header-link">后台管理</a>
      </div>
    </div>

    <div class="upload-card">
      <div class="section-title">上传图片</div>
      <div class="section-sub">支持 PNG / JPG / GIF / WebP 等常见图片格式。</div>

      <div class="dropzone" id="dropzone">
        <div class="dropzone-icon">↑</div>
        <div class="dropzone-title">点击选择图片，或将图片拖拽到这里</div>
        <div class="dropzone-sub">上传完成后将生成以当前域名开头的访问链接。</div>
        <button class="btn-choose" id="btn-choose">选择图片</button>
        <div class="file-name" id="file-name">尚未选择图片</div>
      </div>

      <button class="btn-upload" id="btn-upload">开始上传</button>

      <div class="status-line" id="status-text"></div>

      <div class="result-box" id="result-box" style="display: none;">
        <div class="result-label">图片访问链接</div>
        <div class="result-url-row">
          <input id="result-url" class="result-input" readonly />
          <button class="btn-copy" id="btn-copy">复制</button>
        </div>
      </div>
    </div>
  </div>

  <input type="file" id="file-input" accept="image/*" />
</body>
</html>
