<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>Imagebed 图床 - 上传</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      margin: 0;
      padding: 40px 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: #f4f4f5;
    }
    .container {
      max-width: 640px;
      margin: 0 auto;
      background: #fff;
      border-radius: 12px;
      padding: 24px 22px 22px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
    }
    h1 {
      margin: 0 0 16px;
      font-size: 22px;
    }
    .desc {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 16px;
    }
    label {
      display: block;
      margin-top: 12px;
      font-size: 13px;
      font-weight: 600;
    }
    input[type="file"] {
      width: 100%;
      margin-top: 4px;
      padding: 8px 0;
      font-size: 14px;
    }
    button {
      margin-top: 20px;
      padding: 10px 18px;
      border-radius: 999px;
      border: none;
      background: #2563eb;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
    }
    button[disabled] {
      opacity: .6;
      cursor: default;
    }
    .top-links {
      font-size: 12px;
      margin-bottom: 12px;
    }
    .top-links a {
      color: #2563eb;
      text-decoration: none;
      margin-right: 12px;
    }
    .msg {
      margin-top: 12px;
      font-size: 13px;
      display: none;
    }
    .msg.error { color: #b91c1c; }
    .msg.success { color: #15803d; }
    .result-url {
      margin-top: 6px;
      font-size: 12px;
      color: #111827;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="top-links">
      <a href="/admin/">后台管理</a>
    </div>
    <h1>Imagebed 图床 - 上传</h1>
    <p class="desc">
      选择本地图片文件，系统会自动分配存储桶并返回访问地址。
      如果尚未配置任何存储桶，请先前往后台创建。
    </p>

    <div id="msg" class="msg"></div>
    <div id="result" class="result-url"></div>

    <form id="upload-form">
      <label for="file">图片文件</label>
      <input id="file" name="file" type="file" accept="image/*" required />
      <button type="submit" id="btn-upload">上传图片</button>
    </form>
  </div>

  <script>
    const form = document.getElementById("upload-form");
    const fileInput = document.getElementById("file");
    const msg = document.getElementById("msg");
    const result = document.getElementById("result");
    const btn = document.getElementById("btn-upload");

    function show(type, text) {
      msg.textContent = text;
      msg.className = "msg " + type;
      msg.style.display = "block";
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      msg.style.display = "none";
      result.textContent = "";

      if (!fileInput.files || fileInput.files.length === 0) {
        show("error", "请先选择要上传的图片文件。");
        return;
      }

      const fd = new FormData();
      fd.append("file", fileInput.files[0]);

      btn.disabled = true;
      btn.textContent = "上传中...";

      try {
        const res = await fetch("/api/upload", {
          method: "POST",
          body: fd,
        });
        const json = await res.json().catch(() => ({}));

        if (!res.ok) {
          if (json.error === "no_bucket_available") {
            show("error", "暂无可用存储桶，请先在后台创建一个存储桶。");
          } else {
            show("error", json.error || "上传失败，请稍后重试。");
          }
        } else {
          const url = json.url || json.link || "";
          show("success", "上传成功！");
          if (url) {
            result.textContent = "访问地址：" + url;
          }
        }
      } catch (err) {
        show("error", "上传失败：" + err);
      } finally {
        btn.disabled = false;
        btn.textContent = "上传图片";
      }
    });
  </script>
</body>
</html>
