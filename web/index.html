<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>Imagebed 图床</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
      background: radial-gradient(circle at top, #eff6ff 0, #f9fafb 45%, #f3f4f6 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 12px;
      color: #111827;
    }
    .shell {
      width: 100%;
      max-width: 720px;
      background: rgba(255,255,255,0.96);
      border-radius: 20px;
      box-shadow: 0 22px 60px rgba(15,23,42,0.14);
      padding: 24px 24px 22px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }
    .logo {
      font-size: 21px;
      font-weight: 700;
      letter-spacing: .02em;
    }
    .logo span { color: #2563eb; }
    .subtitle {
      font-size: 13px;
      color: #6b7280;
      max-width: 520px;
      margin-top: 6px;
    }
    .actions {
      margin-top: 14px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .btn {
      border: none;
      border-radius: 999px;
      padding: 9px 18px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .btn-primary {
      background: #2563eb;
      color: #fff;
    }
    .btn-secondary {
      background: #e5e7eb;
      color: #111827;
    }
    .hint {
      margin-top: 8px;
      font-size: 11px;
      color: #9ca3af;
    }
    .panel {
      margin-top: 10px;
      border-radius: 14px;
      border: 1px solid #e5e7eb;
      background: #f9fafb;
      padding: 12px 14px;
      font-size: 12px;
      color: #4b5563;
    }
    .panel h3 {
      margin: 0 0 6px;
      font-size: 13px;
      font-weight: 600;
      color: #111827;
    }
    .panel ul {
      margin: 4px 0 0;
      padding-left: 18px;
    }
    .panel li { margin: 2px 0; }
  </style>
</head>
<body>
<div class="shell">
  <div>
    <div class="logo"><span>Imagebed</span> 图床</div>
    <div class="subtitle">
      一个轻量的自建图床服务，支持 Cloudflare R2、Turnstile 人机验证与基础图片安全检查。
      你可以直接上传图片，也可以登录后台管理存储桶和配置。
    </div>

    <div class="actions">
      <a class="btn btn-primary" href="/upload/">开始上传图片</a>
      <a class="btn btn-secondary" href="/admin/">进入后台管理</a>
    </div>

    <div class="hint">
      如果是第一次部署本服务，请先访问 <code>/setup</code> 完成初始化安装。
    </div>
  </div>

  <div class="panel">
    <h3>使用说明</h3>
    <ul>
      <li>上传页只提供「单张图片上传」功能，具体存储桶由后端自动分配。</li>
      <li>如启用 Turnstile，请先在后台填写 Site Key 和 Secret Key，并通过一次验证测试。</li>
      <li>若访问上传或后台出现 500 错误，多半是初始化未完成或数据库异常，可尝试重新走安装。</li>
    </ul>
  </div>
</div>
</body>
</html>
