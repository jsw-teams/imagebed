<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>Imagebed 安装向导</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 40px;
      background: #f5f5f5;
    }
    .card {
      max-width: 640px;
      margin: 0 auto;
      background: #fff;
      padding: 24px 28px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
    }
    h1 {
      margin-top: 0;
      font-size: 24px;
    }
    label {
      display: block;
      margin-top: 12px;
      font-weight: 600;
    }
    input {
      width: 100%;
      padding: 8px 10px;
      margin-top: 4px;
      border-radius: 4px;
      border: 1px solid #ddd;
      box-sizing: border-box;
    }
    .desc {
      font-size: 12px;
      color: #666;
    }
    .error {
      margin-top: 12px;
      color: #c00;
      font-size: 13px;
      display: none;
    }
    .success {
      margin-top: 12px;
      color: #0a7b18;
      font-size: 13px;
      display: none;
    }
    button {
      margin-top: 20px;
      padding: 10px 18px;
      border-radius: 4px;
      border: none;
      background: #2563eb;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
    }
    button:hover {
      background: #1d4ed8;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Imagebed 初始化安装</h1>
    <p class="desc">
      请填写数据库、R2 以及管理员信息。提交后会测试数据库连接，通过后才会写入配置。
    </p>

    <div id="error" class="error"></div>
    <div id="success" class="success"></div>

    <form id="setup-form">
      <label>数据库 DSN（PostgreSQL）</label>
      <input
        name="database_dsn"
        placeholder="postgres://user:pass@localhost:5432/imagebed?sslmode=disable"
        required
      />

      <label>R2 Account ID</label>
      <input name="r2_account_id" placeholder="xxxxxxxxxxxxxxxxxxxxxxx" required />

      <label>R2 Access Key ID</label>
      <input name="r2_access_key_id" required />

      <label>R2 Secret Access Key</label>
      <input name="r2_secret_access_key" type="password" required />

      <label>R2 Region</label>
      <input name="r2_region" placeholder="auto 或 eu，留空默认 auto" />

      <label>R2 Public Base URL（可选）</label>
      <input name="r2_public_base_url" placeholder="例如：https://img.example.com" />

      <label>管理员用户名</label>
      <input name="admin_username" placeholder="admin" required />

      <label>管理员密码</label>
      <input name="admin_password" type="password" required />

      <button type="submit">开始安装</button>
    </form>
  </div>

  <script>
    const form = document.getElementById("setup-form");
    const errBox = document.getElementById("error");
    const okBox = document.getElementById("success");

    function showError(msg) {
      errBox.textContent = "错误：" + msg;
      errBox.style.display = "block";
      okBox.style.display = "none";
    }

    function showSuccess(msg) {
      okBox.textContent = msg;
      okBox.style.display = "block";
      errBox.style.display = "none";
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const data = new FormData(form);
      const payload = {
        database_dsn: data.get("database_dsn")?.trim(),
        r2_account_id: data.get("r2_account_id")?.trim(),
        r2_access_key_id: data.get("r2_access_key_id")?.trim(),
        r2_secret_access_key: data.get("r2_secret_access_key")?.trim(),
        r2_region: data.get("r2_region")?.trim(),
        r2_public_base_url: data.get("r2_public_base_url")?.trim(),
        admin_username: data.get("admin_username")?.trim(),
        admin_password: data.get("admin_password")?.trim(),
      };

      try {
        const res = await fetch("/api/setup", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify(payload),
        });
        const json = await res.json().catch(() => ({}));

        if (!res.ok || !json.ok) {
          const msg = json.detail || json.error || "安装失败，请检查配置";
          showError(msg);
          return;
        }

        showSuccess("安装完成，服务已可用，可以关闭本页面或直接调用 API。");
        form.querySelector("button[type=submit]").disabled = true;
      } catch (e) {
        showError("请求失败：" + e);
      }
    });
  </script>
</body>
</html>
