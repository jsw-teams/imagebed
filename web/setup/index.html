<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>Imagebed 安装向导</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Imagebed 图床安装向导，配置数据库并创建管理员账号。" />
  <link rel="stylesheet" href="/setup/index.css" />
</head>
<body>
  <div class="shell">
    <header class="header">
      <div class="brand">
        <div class="brand-logo">Ib</div>
        <div class="brand-text">
          <div class="brand-title">Imagebed 安装</div>
          <div class="brand-sub">完成数据库与管理员配置后即可使用。</div>
        </div>
      </div>
    </header>

    <nav class="steps">
      <div id="step-db" class="step step-active">
        <div class="step-index">1</div>
        <div class="step-text">数据库</div>
      </div>
      <div id="step-admin" class="step">
        <div class="step-index">2</div>
        <div class="step-text">管理员</div>
      </div>
    </nav>

    <div id="setup-status" class="status"></div>

    <main class="content">
      <section id="panel-db" class="panel panel-active">
        <div class="card">
          <h2 class="card-title">配置数据库</h2>
          <form id="db-form" class="form">
            <div class="field">
              <label for="db-name">数据库名称</label>
              <input id="db-name" class="input" placeholder="例如：imagebed" />
            </div>
            <div class="field">
              <label for="db-user">数据库用户</label>
              <input id="db-user" class="input" placeholder="例如：imagebed" />
            </div>
            <div class="field">
              <label for="db-pass">数据库密码</label>
              <input id="db-pass" type="password" class="input" placeholder="填写该用户密码" />
            </div>
            <div class="button-row">
              <button type="submit" id="btn-db-save" class="btn-primary">测试并保存</button>
            </div>
          </form>
        </div>
      </section>

      <section id="panel-admin" class="panel">
        <div class="card">
          <h2 class="card-title">创建管理员</h2>
          <form id="admin-form" class="form">
            <div class="field">
              <label for="admin-name">管理员用户名</label>
              <input id="admin-name" class="input" placeholder="默认可用：admin" />
            </div>
            <div class="field">
              <label for="admin-pass">管理员密码</label>
              <input id="admin-pass" type="password" class="input" placeholder="设置一个安全密码" />
            </div>
            <div class="button-row">
              <button type="button" id="btn-admin-back" class="btn-ghost">上一步</button>
              <button type="submit" id="btn-admin-save" class="btn-primary">完成安装</button>
            </div>
          </form>
        </div>
      </section>
    </main>
  </div>
  <script src="/setup/index.js"></script>
</body>
</html>
