<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>Imagebed 图床 - 上传</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
      background: radial-gradient(circle at top, #eff6ff 0, #f9fafb 45%, #f3f4f6 100%);
      color: #111827;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 12px;
    }
    .shell {
      width: 100%;
      max-width: 840px;
      background: rgba(255,255,255,0.95);
      border-radius: 18px;
      box-shadow: 0 18px 45px rgba(15,23,42,0.12);
      padding: 22px 24px 20px;
      display: grid;
      grid-template-columns: minmax(0, 3fr) minmax(0, 2fr);
      gap: 18px;
    }
    @media (max-width: 800px) {
      .shell {
        grid-template-columns: minmax(0, 1fr);
        max-width: 480px;
      }
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .logo {
      font-weight: 700;
      font-size: 20px;
      letter-spacing: .02em;
    }
    .logo span { color: #2563eb; }
    .nav a {
      font-size: 13px;
      color: #6b7280;
      text-decoration: none;
      margin-left: 12px;
    }
    .nav a:hover { color: #2563eb; }

    .upload-card {
      border-radius: 14px;
      border: 1px solid #e5e7eb;
      padding: 14px 14px 16px;
      background: linear-gradient(135deg,#ffffff,#f9fafb);
    }
    .upload-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .upload-desc {
      font-size: 12px;
      color: #6b7280;
      margin-bottom: 12px;
    }
    .dropzone {
      border-radius: 12px;
      border: 1px dashed #cbd5f5;
      background: #f9fafb;
      padding: 18px 14px;
      text-align: center;
      transition: border-color .15s, background .15s, transform .1s;
      cursor: pointer;
    }
    .dropzone.dragover {
      border-color: #2563eb;
      background: #eff6ff;
      transform: translateY(-1px);
    }
    .drop-main {
      font-size: 14px;
      margin-bottom: 6px;
    }
    .drop-sub {
      font-size: 12px;
      color: #6b7280;
    }
    .hidden-input { display: none; }
    .controls {
      margin-top: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    button {
      border: none;
      border-radius: 999px;
      padding: 7px 16px;
      font-size: 13px;
      cursor: pointer;
      background: #2563eb;
      color: #fff;
      font-weight: 500;
    }
    button.secondary {
      background: #e5e7eb;
      color: #111827;
    }
    button:disabled {
      opacity: .6;
      cursor: default;
    }
    .progress {
      margin-top: 10px;
      height: 6px;
      border-radius: 999px;
      background: #e5e7eb;
      overflow: hidden;
      display: none;
    }
    .progress-inner {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg,#2563eb,#4f46e5);
      transition: width .15s;
    }
    .status {
      margin-top: 8px;
      font-size: 12px;
      color: #6b7280;
      min-height: 16px;
    }
    .status.error { color: #b91c1c; }
    .status.success { color: #15803d; }

    .preview-card {
      border-radius: 14px;
      border: 1px solid #e5e7eb;
      padding: 12px 14px 13px;
      background: #ffffff;
    }
    .preview-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 5px;
    }
    .preview-box {
      border-radius: 10px;
      background: #f9fafb;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 260px;
      overflow-y: auto;
      font-size: 12px;
    }
    .preview-box code {
      font-family: ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace;
      font-size: 11px;
      word-break: break-all;
    }
    .tag {
      display: inline-block;
      border-radius: 999px;
      padding: 2px 7px;
      background: #eff6ff;
      color: #2563eb;
      font-size: 11px;
      margin-bottom: 4px;
    }
    .copy-group {
      display: flex;
      gap: 6px;
      align-items: center;
      margin-top: 2px;
    }
    .copy-group input {
      flex: 1;
      border-radius: 8px;
      border: 1px solid #e5e7eb;
      padding: 5px 7px;
      font-size: 12px;
    }
    .copy-group button {
      padding: 6px 10px;
      font-size: 12px;
    }
  </style>
</head>
<body>
<div class="shell">
  <div>
    <div class="header">
      <div class="logo"><span>Imagebed</span> 图床</div>
      <div class="nav">
        <a href="/">首页</a>
        <a href="/admin/">后台管理</a>
        <a href="/setup/">初始化</a>
      </div>
    </div>

    <div class="upload-card">
      <div class="upload-title">上传图片</div>
      <div class="upload-desc">
        选择一张图片即可上传，后端会自动分配存储桶。支持常见格式（JPG / PNG / GIF / WebP 等），单文件大小受后端限制。
      </div>

      <div id="dropzone" class="dropzone">
        <div class="drop-main">点击选择图片，或将文件拖拽到此处</div>
        <div class="drop-sub">仅上传一张图片，上传即代表你同意遵守站点规则。</div>
      </div>
      <input id="file-input" class="hidden-input" type="file" accept="image/*" />

      <div class="controls">
        <button id="btn-upload">上传图片</button>
        <button id="btn-reset" class="secondary">清空选择</button>
        <span id="file-name" style="font-size:12px;color:#6b7280;"></span>
      </div>

      <div class="progress" id="progress">
        <div class="progress-inner" id="progress-inner"></div>
      </div>
      <div class="status" id="status"></div>
    </div>
  </div>

  <div class="preview-card">
    <div class="preview-title">上传结果</div>
    <div class="preview-box" id="result-box">
      <span style="font-size:12px;color:#9ca3af;">还没有上传记录。</span>
    </div>
  </div>
</div>

<script>
  const dropzone = document.getElementById("dropzone");
  const fileInput = document.getElementById("file-input");
  const btnUpload = document.getElementById("btn-upload");
  const btnReset = document.getElementById("btn-reset");
  const fileNameLabel = document.getElementById("file-name");
  const progress = document.getElementById("progress");
  const progressInner = document.getElementById("progress-inner");
  const statusEl = document.getElementById("status");
  const resultBox = document.getElementById("result-box");

  let currentFile = null;

  function setStatus(text, type) {
    statusEl.textContent = text || "";
    statusEl.className = "status" + (type ? " " + type : "");
  }

  function resetProgress() {
    progress.style.display = "none";
    progressInner.style.width = "0%";
  }

  function setProgress(p) {
    progress.style.display = "block";
    progressInner.style.width = p + "%";
  }

  function resetSelection() {
    currentFile = null;
    fileInput.value = "";
    fileNameLabel.textContent = "";
    setStatus("", "");
    resetProgress();
  }

  dropzone.addEventListener("click", () => fileInput.click());

  dropzone.addEventListener("dragover", (e) => {
    e.preventDefault();
    dropzone.classList.add("dragover");
  });

  dropzone.addEventListener("dragleave", (e) => {
    e.preventDefault();
    dropzone.classList.remove("dragover");
  });

  dropzone.addEventListener("drop", (e) => {
    e.preventDefault();
    dropzone.classList.remove("dragover");
    if (e.dataTransfer.files && e.dataTransfer.files[0]) {
      currentFile = e.dataTransfer.files[0];
      fileNameLabel.textContent = currentFile.name + " (" + Math.round(currentFile.size / 1024) + " KB)";
    }
  });

  fileInput.addEventListener("change", () => {
    const f = fileInput.files[0];
    if (f) {
      currentFile = f;
      fileNameLabel.textContent = f.name + " (" + Math.round(f.size / 1024) + " KB)";
    }
  });

  btnReset.addEventListener("click", (e) => {
    e.preventDefault();
    resetSelection();
  });

  btnUpload.addEventListener("click", async (e) => {
    e.preventDefault();
    if (!currentFile) {
      setStatus("请先选择一张图片。", "error");
      return;
    }

    setStatus("开始上传...", "");
    resetProgress();
    setProgress(5);
    btnUpload.disabled = true;

    try {
      const form = new FormData();
      form.append("file", currentFile);
      // 如启用 Turnstile，可在此附带 token：form.append("turnstile_token", token);

      const res = await fetch("/api/upload", { method: "POST", body: form });
      const text = await res.text();
      let data = null;
      try { data = JSON.parse(text); } catch (_) {}

      if (!res.ok) {
        let msg = "上传失败";
        if (data && data.error) {
          msg += "：" + data.error;
          if (data.error === "not_installed") {
            msg += "，请先前往 /setup 完成初始化。";
          }
        } else {
          msg += "（HTTP " + res.status + "）";
        }
        setStatus(msg, "error");
        resetProgress();
        return;
      }

      setProgress(90);

      // 优先取后端返回的 ID，用当前访问域名拼 /i/{id}
      const id = data && (data.id || data.image_id || data.short_id || data.key || "");
      const urlFromServer = data && (data.url || data.public_url || data.image_url || "");

      appendResult(urlFromServer, id, data);

      setProgress(100);
      setStatus("上传成功。", "success");
    } catch (err) {
      console.error(err);
      setStatus("上传请求失败：" + err, "error");
      resetProgress();
    } finally {
      btnUpload.disabled = false;
    }
  });

  /**
   * 这里是关键改动：
   * 1. 优先使用当前访问域名 + /i/{id} 生成最终 URL；
   * 2. 若没有 ID，则回退到后端给的完整 URL（urlFromServer）。
   */
  function appendResult(urlFromServer, id, raw) {
    resultBox.innerHTML = "";

    const tag = document.createElement("div");
    tag.className = "tag";
    tag.textContent = "最新上传";
    resultBox.appendChild(tag);

    // 计算当前站点 origin（支持旧浏览器）
    const origin = window.location.origin ||
      (window.location.protocol + "//" + window.location.host);

    let finalURL = "";
    if (id) {
      // 去掉 origin 末尾的 /，拼 /i/{id}
      const base = origin.replace(/\/$/, "");
      finalURL = base + "/i/" + encodeURIComponent(id);
    } else if (urlFromServer) {
      // 兜底：没有 id 就用后端给的 URL
      finalURL = urlFromServer;
    }

    if (finalURL) {
      const group = document.createElement("div");
      group.className = "copy-group";
      const input = document.createElement("input");
      input.value = finalURL;
      const btn = document.createElement("button");
      btn.textContent = "复制链接";
      btn.addEventListener("click", () => {
        input.select();
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(input.value);
        } else {
          document.execCommand("copy");
        }
        btn.textContent = "已复制";
        setTimeout(() => btn.textContent = "复制链接", 1200);
      });
      group.appendChild(input);
      group.appendChild(btn);
      resultBox.appendChild(group);
    } else {
      const p = document.createElement("div");
      p.textContent = id
        ? ("图片 ID: " + id)
        : "上传成功，但未能解析返回中的 URL/ID。";
      resultBox.appendChild(p);
    }

    if (raw) {
      const pre = document.createElement("div");
      pre.innerHTML = "<div style='margin-top:8px;font-size:11px;color:#6b7280;'>原始响应：</div>";
      const code = document.createElement("code");
      code.textContent = JSON.stringify(raw, null, 2);
      pre.appendChild(code);
      resultBox.appendChild(pre);
    }
  }
</script>
</body>
</html>
